services:
  togetherplay:
    build:
      context: /change/me # path to the folder of togetherplay data (config, logs, etc.)
      args:
        # Baked into the client bundle at build time.
        # Set this to your Discord Application ID, then rebuild the image.
        VITE_DISCORD_CLIENT_ID: ""
    container_name: togetherplay
    ports:
      - "3000:3000"
    environment:
      - DATA_DIR=/data
      - ADMIN_PASSWORD=changme
      # Discord Activity — fill in after creating an app at discord.com/developers
      - DISCORD_CLIENT_ID=
      - DISCORD_CLIENT_SECRET=
    volumes:
      - /change/me:/data # path to the folder of togetherplay data (config, logs, etc.)
    restart: unless-stopped
